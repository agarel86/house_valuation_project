<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>House Perceptual Attribute Rating Tool</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--brand:#2c3e50;--accent:#3498db;--good:#27ae60;--avg:#f39c12;--bad:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#333}

/* ---- top bar ---- */
.top{background:var(--brand);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18);flex-wrap:wrap}
.top h1{font-size:1.1rem;font-weight:700;white-space:nowrap}
.tabs{display:inline-flex;gap:2px;background:rgba(255,255,255,.12);padding:3px;border-radius:8px}
.tabs button{border:none;background:transparent;color:rgba(255,255,255,.7);padding:6px 18px;border-radius:6px;font-weight:600;font-size:.82rem;cursor:pointer;transition:.15s}
.tabs button.on{background:#fff;color:var(--brand)}
.rater-name{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.82rem}
.rater-name input{width:160px;padding:4px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:.82rem}
.rater-name input::placeholder{color:rgba(255,255,255,.5)}

/* ---- layout ---- */
.wrap{display:flex;height:calc(100vh - 52px)}
.side{width:195px;min-width:195px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;padding:6px}
.side button{display:block;width:100%;text-align:left;border:none;background:none;padding:6px 10px;border-radius:5px;font-size:.78rem;cursor:pointer;margin-bottom:1px;transition:.12s}
.side button:hover{background:#e8f4fd}
.side button.on{background:var(--accent);color:#fff}
.side .prog{font-size:.6rem;opacity:.7;display:block}
.main{flex:1;overflow-y:auto;padding:18px 22px 80px}

/* ---- image viewer ---- */
.iv{background:#111827;border-radius:10px;padding:14px;margin-bottom:18px}
.strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scroll-behavior:smooth}
.strip::-webkit-scrollbar{height:5px}
.strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}
.th{width:88px;height:64px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:.15s}
.th:hover{border-color:rgba(255,255,255,.4)}
.th.on{border-color:var(--accent);box-shadow:0 0 6px rgba(52,152,219,.5)}
.big{display:block;max-height:400px;max-width:100%;margin:10px auto 0;border-radius:8px;object-fit:contain}
.ctr{color:rgba(255,255,255,.6);text-align:center;font-size:.75rem;margin-top:6px}

/* ---- feature rows ---- */
.sh{font-size:.95rem;font-weight:700;color:var(--brand);margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--accent)}
.subh{font-size:.82rem;font-weight:600;color:#555;margin:12px 0 6px;padding-left:8px;border-left:3px solid var(--accent)}
.fr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;margin-bottom:3px;background:#fff;border:1px solid #e9ecef;transition:.12s;flex-wrap:wrap}
.fr:hover{border-color:#c5c5c5}
.fn{flex:1;min-width:160px;font-size:.8rem;font-weight:500}
.fn small{display:block;color:#999;font-weight:400;font-size:.68rem}
.ob{font-size:.58rem;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.ob.first{background:#e8f5e9;color:#2e7d32}
.ob.second{background:#fff3e0;color:#e65100}
.ag{display:inline-block;padding:2px 9px;border-radius:4px;font-size:.76rem;font-weight:600;min-width:68px;text-align:center}
.ag.Excellent{background:#d5f5e3;color:#1b7a3d}
.ag.Good{background:#d4efdf;color:#1e8449}
.ag.Average{background:#fef9e7;color:#9a7d0a}
.ag.Bad{background:#fdedec;color:#c0392b}
.ag.Terrible{background:#f9ebea;color:#922b21}
.ag.Unknown{background:#ebedef;color:#666}
.ag.True{background:#d5f5e3;color:#1b7a3d}
.ag.False{background:#fdedec;color:#c0392b}
.vb button{border:none;padding:3px 10px;border-radius:4px;font-size:.74rem;cursor:pointer;font-weight:500;transition:.12s}
.ba{background:#e8f5e9;color:#2e7d32}.ba:hover,.ba.s{background:#27ae60;color:#fff}
.bd{background:#fce4ec;color:#c62828}.bd:hover,.bd.s{background:#e74c3c;color:#fff}
.gs{padding:3px 7px;border-radius:4px;border:1px solid #ccc;font-size:.76rem;min-width:95px}
.gs.done{border-color:var(--accent);background:#e8f4fd}
.cmp{font-size:.74rem;display:inline-flex;align-items:center;gap:4px}
.cmp .y{color:var(--good)}.cmp .n{color:var(--bad)}
.ev{display:flex;gap:3px;flex-wrap:wrap}
.ev img{width:34px;height:25px;object-fit:cover;border-radius:3px;cursor:pointer;border:1px solid #ddd}
.ev img:hover{border-color:var(--accent)}
.cb{height:5px;width:44px;background:#eee;border-radius:3px;display:inline-block;vertical-align:middle}
.cf{height:100%;border-radius:3px;background:var(--accent)}
.fbar{display:flex;gap:8px;padding:8px 0;flex-wrap:wrap;align-items:center;font-size:.78rem}
.fbar label{font-weight:500;color:#666}
.fbar select{font-size:.78rem;padding:3px 7px;border-radius:4px;border:1px solid #ccc}

/* ---- bottom bar ---- */
.bot{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:8px 20px;display:flex;justify-content:space-between;align-items:center;z-index:150}
.bot .info{font-size:.78rem;color:#666}
.btn-ex{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-weight:500;cursor:pointer;font-size:.8rem}
.btn-ex:hover{filter:brightness(1.1)}
.btn-ex.green{background:var(--good)}
.empty{text-align:center;padding:50px 20px;color:#aaa}
.empty i{font-size:2.5rem;display:block;margin-bottom:10px}

/* ---- taxonomy tab ---- */
.tx-intro{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;border:1px solid #e0e0e0;font-size:.84rem;line-height:1.6;color:#444}
.tx-intro b{color:var(--brand)}
.tx-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px;margin-bottom:8px;transition:.12s}
.tx-card:hover{border-color:#bbb;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.tx-top{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.tx-name{font-size:.88rem;font-weight:600;color:var(--brand);flex:1;min-width:180px}
.tx-def{font-size:.78rem;color:#555;margin-top:3px;line-height:1.5}
.tx-rat{font-size:.74rem;color:#777;margin-top:4px;font-style:italic;line-height:1.45}
.tx-rat::before{content:"Rationale: ";font-weight:600;font-style:normal;color:#666}
.tx-cues{font-size:.7rem;color:#999;margin-top:3px}
.tx-cues span{background:#f5f5f5;padding:1px 6px;border-radius:3px;margin-right:3px;display:inline-block;margin-bottom:2px}
.tx-actions{display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;flex-wrap:wrap;align-items:center}
.tx-q{font-size:.76rem;color:#555;font-weight:500}
.tx-btns{display:inline-flex;gap:3px}
.tx-btns button{border:none;padding:3px 10px;border-radius:4px;font-size:.72rem;cursor:pointer;font-weight:500;transition:.12s}
.tb-y{background:#e8f5e9;color:#2e7d32}.tb-y:hover,.tb-y.s{background:#27ae60;color:#fff}
.tb-n{background:#fce4ec;color:#c62828}.tb-n:hover,.tb-n.s{background:#e74c3c;color:#fff}
.tb-1{background:#e8f5e9;color:#2e7d32}.tb-1:hover,.tb-1.s{background:#1b5e20;color:#fff}
.tb-2{background:#fff3e0;color:#e65100}.tb-2:hover,.tb-2.s{background:#e65100;color:#fff}
.tb-a{background:#e3f2fd;color:#1565c0}.tb-a:hover,.tb-a.s{background:#1565c0;color:#fff}
.tx-psy span{font-size:.68rem;background:#ede7f6;color:#4527a0;padding:1px 5px;border-radius:3px;margin-right:3px}
.tx-summary{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px 18px;margin-top:20px;font-size:.82rem}
.tx-summary b{color:var(--brand)}
.tx-counter{display:inline-block;background:var(--accent);color:#fff;padding:1px 8px;border-radius:10px;font-size:.72rem;font-weight:600;margin-left:6px}

@media(max-width:800px){.side{display:none}.wrap{flex-direction:column}}
</style>
</head>
<body>

<div class="top">
  <h1><i class="bi bi-house-heart-fill"></i> Perceptual Attribute Rating</h1>
  <div class="tabs" id="T">
    <button class="on" data-t="t" onclick="tab('t')">1. Validate Taxonomy</button>
    <button data-t="v" onclick="tab('v')">2. Validate AI Grades</button>
    <button data-t="r" onclick="tab('r')">3. Rate Houses</button>
  </div>
  <div class="rater-name">
    <i class="bi bi-person-circle"></i>
    <input id="raterName" placeholder="Your name (optional)" oninput="FS.rater=this.value;save()">
  </div>
</div>

<div class="wrap">
  <div class="side" id="S"></div>
  <div class="main" id="M"><div class="empty"><i class="bi bi-arrow-left-circle"></i>Select a house to begin</div></div>
</div>

<div class="bot">
  <div class="info" id="PI">No house selected</div>
  <div style="display:flex;gap:6px">
    <button class="btn-ex" onclick="exp('json')"><i class="bi bi-download"></i> Export JSON</button>
    <button class="btn-ex green" onclick="exp('csv')"><i class="bi bi-file-earmark-spreadsheet"></i> Export CSV</button>
  </div>
</div>

oliage","seasonal decor"],"psy":["emotional_attachment"],"ord":"second"}];
const FL={"3a_Property_Appeal":"Property Appeal","3b_Environmental_Cues":"Environmental Cues","3c_Staging_and_Presentation":"Staging & Presentation"};
const SL={"Exterior_Architecture":"Exterior Architecture","Interior_Design_and_Layout":"Interior Design & Layout","Outdoor_Spaces":"Outdoor Spaces","Neighborhood_Context":"Neighborhood Context","Environmental_Quality":"Environmental Quality","Photographic_Quality":"Photographic Quality","Interior_Staging":"Interior Staging","Exterior_Presentation":"Exterior Presentation"};
const GR=["Excellent","Good","Average","Bad","Terrible","Unknown"];
let CT="t",CH=null,CI=0,R=JSON.parse(localStorage.getItem("rr")||"{}"),KH=null;
let FS={of:"all",sf:"all",sf2:"all",sft:"all",ai:false,rater:""};

function init(){
  const s=document.getElementById("S");
  H.forEach(h=>{
    const b=document.createElement("button");
    b.dataset.id=h.id;
    b.onclick=()=>sel(h.id);
    s.appendChild(b);
  });
  const saved=localStorage.getItem("rr_rater");
  if(saved){FS.rater=saved;document.getElementById("raterName").value=saved;}
  badges();
  renderTax();
}

function tab(t){CT=t;document.querySelectorAll("#T button").forEach(b=>b.classList.toggle("on",b.dataset.t===t));if(CT==="t"){renderTax();}else if(CH){render();}}
function sel(id){CH=H.find(h=>h.id===id);if(!CH)return;CI=0;document.querySelectorAll("#S button").forEach(b=>b.classList.toggle("on",b.dataset.id===id));if(CT==="t"){CT="v";document.querySelectorAll("#T button").forEach(b=>b.classList.toggle("on",b.dataset.t==="v"));}render();}

function render(){
  const m=document.getElementById("M");
  if(CT==="t"){renderTax();return;}
  let o=iv();
  o+=CT==="v"?vtab():rtab();
  m.innerHTML=o;
  prog();bind();
}

function iv(){
  if(!CH)return"";
  const imgs=CH.imgs;
  let t=imgs.map((img,i)=>'<img class="th'+(i===0?" on":"")+'" src="'+CH.ip+img+'" data-i="'+i+'" onclick="si('+i+')" alt="'+img+'" loading="lazy">').join("");
  return'<div class="iv"><div class="strip" id="ST">'+t+'</div><img class="big" id="BI" src="'+CH.ip+imgs[0]+'" alt="Main"><div class="ctr" id="CT2">1 / '+imgs.length+' — '+imgs[0]+'</div></div>';
}

function si(i){
  if(!CH)return;CI=i;
  const imgs=CH.imgs;
  document.getElementById("BI").src=CH.ip+imgs[i];
  document.getElementById("CT2").innerHTML=(i+1)+" / "+imgs.length+" — "+imgs[i];
  document.querySelectorAll(".th").forEach((t,j)=>t.classList.toggle("on",j===i));
  const th=document.getElementById("ST").children[i];
  if(th)th.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

function sei(name){if(!CH)return;const i=CH.imgs.indexOf(name);if(i>=0)si(i);}

function bind(){
  if(KH)document.removeEventListener("keydown",KH);
  KH=e=>{if(!CH)return;if(e.key==="ArrowLeft"&&CI>0)si(CI-1);if(e.key==="ArrowRight"&&CI<CH.imgs.length-1)si(CI+1);};
  document.addEventListener("keydown",KH);
}

/* ---- Taxonomy tab ---- */
function renderTax(){
  const m=document.getElementById("M");
  const done=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].rel).length;
  let o='<div class="tx-intro"><b>Step 1: Validate the Taxonomy</b><br>'+
    'Below are the <b>'+TX.length+' perceptual variables</b> generated by the LLM, organized by section. '+
    'For each variable, the AI has provided a definition and a rationale explaining why it matters for house valuation. '+
    'The AI also classified each variable as <span class="ob first" style="font-size:.65rem">1st order</span> (directly affects cost, risk, usability) '+
    'or <span class="ob second" style="font-size:.65rem">2nd order</span> (refines aesthetic appeal, design coherence).<br><br>'+
    'For each variable, please indicate:<br>'+
    '&bull; <b>Does this variable matter</b> for valuing a house in general? (Yes / No)<br>'+
    '&bull; <b>Do you agree with the order classification?</b> (Agree / Should be 1st / Should be 2nd)</div>';

  o+='<div class="fbar"><label>Section:</label><select onchange="FS.sft=this.value;renderTax()"><option value="all"'+(FS.sft==="all"?" selected":"")+'>All Sections</option>'+
    Object.entries(FL).map(([k,v])=>'<option value="'+k+'"'+(FS.sft===k?" selected":"")+'>'+v+'</option>').join("")+'</select>'+
    '<span style="margin-left:auto;font-size:.78rem;color:#666">Completed: <b>'+done+'</b> / '+TX.length+'</span></div>';

  let lsec="",lsub="";
  TX.forEach(t=>{
    if(FS.sft!=="all"&&t.sec!==FS.sft)return;
    if(t.sec!==lsec){lsec=t.sec;lsub="";o+='<div class="sh">'+(FL[t.sec]||t.sec)+'</div>';}
    if(t.sub!==lsub){lsub=t.sub;o+='<div class="subh">'+(SL[t.sub]||t.sub)+'</div>';}
    const k="tx_"+t.vn,sv=R[k]||{};
    let cues="";
    if(t.cues&&t.cues.length)cues='<div class="tx-cues"><b>Visual cues:</b> '+t.cues.map(c=>'<span>'+c+'</span>').join("")+'</div>';
    let psy="";
    if(t.psy&&t.psy.length)psy='<div class="tx-cues" style="margin-top:2px"><b>Psychological:</b> '+t.psy.map(p=>'<span style="background:#ede7f6;color:#4527a0">'+p+'</span>').join("")+'</div>';

    o+='<div class="tx-card"><div class="tx-top">'+
      '<span class="ob '+t.ord+'">'+(t.ord==="first"?"1st order":"2nd order")+'</span>'+
      '<div style="flex:1"><div class="tx-name">'+t.feat.replace(/_/g," ")+'</div>'+
      '<div class="tx-def">'+esc(t.def)+'</div>'+
      '<div class="tx-rat">'+esc(t.rat)+'</div>'+
      cues+psy+'</div></div>'+
      '<div class="tx-actions">'+
      '<span class="tx-q">Matters for valuation?</span>'+
      '<div class="tx-btns">'+
      '<button class="tb-y'+(sv.rel==="yes"?" s":"")+'" onclick="stx(\''+k+'\',\'rel\',\'yes\')"><i class="bi bi-hand-thumbs-up"></i> Yes</button>'+
      '<button class="tb-n'+(sv.rel==="no"?" s":"")+'" onclick="stx(\''+k+'\',\'rel\',\'no\')"><i class="bi bi-hand-thumbs-down"></i> No</button>'+
      '</div>'+
      '<span class="tx-q" style="margin-left:16px">Order classification?</span>'+
      '<div class="tx-btns">'+
      '<button class="tb-a'+(sv.ord==="agree"?" s":"")+'" onclick="stx(\''+k+'\',\'ord\',\'agree\')"><i class="bi bi-check-lg"></i> Agree</button>'+
      '<button class="tb-1'+(sv.ord==="first"?" s":"")+'" onclick="stx(\''+k+'\',\'ord\',\'first\')">Should be 1st</button>'+
      '<button class="tb-2'+(sv.ord==="second"?" s":"")+'" onclick="stx(\''+k+'\',\'ord\',\'second\')">Should be 2nd</button>'+
      '</div></div></div>';
  });

  const yc=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].rel==="yes").length;
  const nc=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].rel==="no").length;
  const ac=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].ord==="agree").length;
  const f1=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].ord==="first").length;
  const f2=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].ord==="second").length;
  if(done>0)o+='<div class="tx-summary"><b>Your progress</b><br>'+
    'Relevance: <span class="tx-counter" style="background:#27ae60">'+yc+' Yes</span> <span class="tx-counter" style="background:#e74c3c">'+nc+' No</span><br>'+
    'Order: <span class="tx-counter" style="background:#1565c0">'+ac+' Agree</span> <span class="tx-counter" style="background:#1b5e20">'+f1+' &rarr;1st</span> <span class="tx-counter" style="background:#e65100">'+f2+' &rarr;2nd</span></div>';

  m.innerHTML=o;
  document.getElementById("PI").innerHTML='<b>Taxonomy Validation</b> — Completed: '+done+' / '+TX.length+' ('+Math.round(done/TX.length*100)+'%)';
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function stx(k,field,val){
  if(!R[k])R[k]={};
  R[k][field]=val;
  save();renderTax();
}

/* ---- Validate tab ---- */
function vtab(){
  if(!CH||!CH.feats.length)return'<div class="empty"><i class="bi bi-exclamation-circle"></i>No feature data for this house.</div>';
  let o='<div class="fbar"><label>Show:</label><select onchange="FS.of=this.value;render()">'+
    [["all","All Variables"],["first","First-Order Only"],["second","Second-Order Only"]].map(([v,l])=>'<option value="'+v+'"'+(FS.of===v?" selected":"")+'>'+l+'</option>').join("")+
    '</select><label>Section:</label><select onchange="FS.sf=this.value;render()"><option value="all"'+(FS.sf==="all"?" selected":"")+'>All</option>'+
    Object.entries(FL).map(([k,v])=>'<option value="'+k+'"'+(FS.sf===k?" selected":"")+'>'+v+'</option>').join("")+'</select></div>';

  const g={first:[],second:[]};
  CH.feats.forEach(f=>{if(FS.of!=="all"&&f.ord!==FS.of)return;if(FS.sf!=="all"&&f.sec!==FS.sf)return;g[f.ord].push(f);});

  [["first","First-Order Variables"],["second","Second-Order Variables"]].forEach(([ord,lbl])=>{
    if(!g[ord].length)return;
    o+='<div class="sh">'+lbl+' ('+g[ord].length+')</div>';
    let ls="";
    g[ord].forEach(f=>{
      if(f.sub!==ls){ls=f.sub;o+='<div class="subh">'+(SL[f.sub]||f.sub)+'</div>';}
      const k=CH.id+"_v_"+f.vn,sv=R[k]||{};
      const cp=Math.round(parseFloat(f.conf||0)*100);
      let ev="";
      if(f.ev&&f.ev.length)ev='<div class="ev">'+f.ev.map(img=>'<img src="'+CH.ip+img+'" onclick="sei(\''+img+'\')" title="'+img+'" loading="lazy">').join("")+'</div>';
      let corr="";
      if(sv.v==="d")corr=' <select class="gs'+(sv.c?" done":"")+'" onchange="sv(\''+k+'\',\'d\',this.value)"><option value="">Correct to…</option>'+GR.map(g=>'<option value="'+g+'"'+(sv.c===g?" selected":"")+'>'+g+'</option>').join("")+'</select>';
      o+='<div class="fr"><span class="ob '+f.ord+'">'+(f.ord==="first"?"1st":"2nd")+'</span>'+
        '<div class="fn">'+f.feat.replace(/_/g," ")+'<small>'+f.vn+' <span class="cb"><span class="cf" style="width:'+cp+'%"></span></span> '+cp+'%</small></div>'+
        ev+'<span class="ag '+f.val+'">'+f.val+'</span>'+
        '<div class="vb"><button class="ba'+(sv.v==="a"?" s":"")+'" onclick="sv(\''+k+'\',\'a\')"><i class="bi bi-check-lg"></i> Agree</button> '+
        '<button class="bd'+(sv.v==="d"?" s":"")+'" onclick="sv(\''+k+'\',\'d\')"><i class="bi bi-x-lg"></i> Disagree</button>'+corr+'</div></div>';
    });
  });
  return o;
}

/* ---- Rate tab ---- */
function rtab(){
  if(!CH||!CH.feats.length)return'<div class="empty"><i class="bi bi-exclamation-circle"></i>No feature data for this house.</div>';
  let o='<div class="fbar"><label>Section:</label><select onchange="FS.sf2=this.value;render()"><option value="all"'+(FS.sf2==="all"?" selected":"")+'>All</option>'+
    Object.entries(FL).map(([k,v])=>'<option value="'+k+'"'+(FS.sf2===k?" selected":"")+'>'+v+'</option>').join("")+'</select>'+
    '<label style="margin-left:10px"><input type="checkbox"'+(FS.ai?" checked":"")+' onchange="FS.ai=this.checked;render()"> Show AI grades</label></div>';

  const grp={};
  CH.feats.forEach(f=>{if(FS.sf2!=="all"&&f.sec!==FS.sf2)return;if(!grp[f.sec])grp[f.sec]={};if(!grp[f.sec][f.sub])grp[f.sec][f.sub]=[];grp[f.sec][f.sub].push(f);});

  for(const[sec,subs] of Object.entries(grp)){
    o+='<div class="sh">'+(FL[sec]||sec)+'</div>';
    for(const[sub,feats] of Object.entries(subs)){
      o+='<div class="subh">'+(SL[sub]||sub)+'</div>';
      feats.forEach(f=>{
        const k=CH.id+"_r_"+f.vn,sv=R[k]||{};
        let cmp="";
        if(FS.ai||sv.g){
          const match=sv.g&&sv.g===f.val;
          const ico=!sv.g?"":match?'<i class="bi bi-check-circle-fill y"></i>':'<i class="bi bi-x-circle-fill n"></i>';
          cmp='<span class="cmp">'+(FS.ai?'<span class="ag '+f.val+'" style="font-size:.7rem">AI: '+f.val+'</span>':'')+' '+ico+'</span>';
        }
        let ev="";
        if(f.ev&&f.ev.length&&FS.ai)ev='<div class="ev">'+f.ev.map(img=>'<img src="'+CH.ip+img+'" onclick="sei(\''+img+'\')" title="'+img+'" loading="lazy">').join("")+'</div>';
        o+='<div class="fr"><span class="ob '+f.ord+'">'+(f.ord==="first"?"1st":"2nd")+'</span>'+
          '<div class="fn">'+f.feat.replace(/_/g," ")+'<small>'+f.vn+'</small></div>'+
          '<select class="gs'+(sv.g?" done":"")+'" onchange="sg(\''+k+'\',this.value)"><option value="">Select…</option>'+
          GR.map(g=>'<option value="'+g+'"'+(sv.g===g?" selected":"")+'>'+g+'</option>').join("")+'</select>'+
          cmp+ev+'</div>';
      });
    }
  }
  return o;
}

/* ---- save helpers ---- */
function sv(k,v,c){if(!R[k])R[k]={};R[k].v=v;if(c!==undefined)R[k].c=c;save();render();}
function sg(k,g){if(!R[k])R[k]={};R[k].g=g;save();prog();}
function save(){localStorage.setItem("rr",JSON.stringify(R));if(FS.rater)localStorage.setItem("rr_rater",FS.rater);badges();}

function prog(){
  if(CT==="t"){
    const d=TX.filter(t=>R["tx_"+t.vn]&&R["tx_"+t.vn].rel).length;
    document.getElementById("PI").innerHTML='<b>Taxonomy Validation</b> — Completed: '+d+' / '+TX.length+' ('+Math.round(d/TX.length*100)+'%)';
    return;
  }
  if(!CH)return;
  const t=CH.feats.length||1;
  if(CT==="v"){
    const d=Object.keys(R).filter(k=>k.startsWith(CH.id+"_v_")&&R[k].v).length;
    document.getElementById("PI").innerHTML='<b>'+CH.id.replace("id","ID ")+'</b> — Validated: '+d+'/'+t+' ('+Math.round(d/t*100)+'%)';
  }else{
    const d=Object.keys(R).filter(k=>k.startsWith(CH.id+"_r_")&&R[k].g).length;
    document.getElementById("PI").innerHTML='<b>'+CH.id.replace("id","ID ")+'</b> — Rated: '+d+'/'+t+' ('+Math.round(d/t*100)+'%)';
  }
}

function badges(){
  document.querySelectorAll("#S button").forEach(b=>{
    const id=b.dataset.id,h=H.find(x=>x.id===id);if(!h)return;
    const vc=Object.keys(R).filter(k=>k.startsWith(id+"_v_")&&R[k].v).length;
    const rc=Object.keys(R).filter(k=>k.startsWith(id+"_r_")&&R[k].g).length;
    const t=h.feats.length;
    let badge='<span style="float:right;font-size:.6rem;opacity:.6">'+h.imgs.length+' imgs</span>';
    if(vc||rc){
      const pv=t?Math.round(vc/t*100):0,pr=t?Math.round(rc/t*100):0;
      badge='<span class="prog">'+(vc?'V:'+pv+'% ':'')+(rc?'R:'+pr+'%':'')+'</span>';
    }
    b.innerHTML=id.replace("id","ID ")+badge;
  });
}

/* ---- export ---- */
function exp(fmt){
  const rater=FS.rater||"anonymous";
  if(fmt==="json"){
    const out={rater,exported_at:new Date().toISOString(),taxonomy_validation:{},results:{}};
    TX.forEach(t=>{const s=R["tx_"+t.vn];if(s)out.taxonomy_validation[t.vn]={...s,ai_order:t.ord,section:t.sec,subcategory:t.sub};});
    H.forEach(h=>{
      const hr={validate:{},rate:{}};
      (h.feats||[]).forEach(f=>{
        const vk=h.id+"_v_"+f.vn,rk=h.id+"_r_"+f.vn;
        if(R[vk])hr.validate[f.vn]={...R[vk],ai:f.val,order:f.ord,confidence:f.conf};
        if(R[rk])hr.rate[f.vn]={...R[rk],ai:f.val,order:f.ord,confidence:f.conf};
      });
      if(Object.keys(hr.validate).length||Object.keys(hr.rate).length)out.results[h.id]=hr;
    });
    dl(JSON.stringify(out,null,2),"rating_results_"+rater+".json","application/json");
  }else{
    let rows=[["rater","type","house_id","variable_name","feature","ai_order","section","subcategory","ai_grade","confidence","matters_for_valuation","order_opinion","validation","correction","user_grade"]];
    TX.forEach(t=>{const s=R["tx_"+t.vn];if(s&&(s.rel||s.ord))rows.push([rater,"taxonomy","",t.vn,t.feat,t.ord,t.sec,t.sub,"","",s.rel||"",s.ord||"","","",""]);});
    H.forEach(h=>{(h.feats||[]).forEach(f=>{
      const vk=h.id+"_v_"+f.vn,rk=h.id+"_r_"+f.vn,v=R[vk]||{},r=R[rk]||{};
      if(v.v||r.g)rows.push([rater,"house",h.id,f.vn,f.feat,f.ord,f.sec,f.sub,f.val,f.conf,"","",v.v||"",v.c||"",r.g||""]);
    });});
    dl(rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n"),"rating_results_"+rater+".csv","text/csv");
  }
}
function dl(c,n,t){const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

init();
</script>
